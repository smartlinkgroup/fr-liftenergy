<nav
  [class.bg-transparent]="!isScrolled"
  [class.bg-white/50]="isScrolled && !isDarkMode"
  [class.bg-black/60]="isScrolled && isDarkMode"
  [class.backdrop-blur-md]="isScrolled"
  [class.border-b]="isScrolled"
  [class.border-white/10]="isScrolled"
  class="fixed top-0 left-0 w-full z-[100] transition-all duration-500 px-6 py-4"
>
  <div class="container mx-auto flex justify-between items-center">
    
    <div class="flex items-center gap-3 cursor-pointer group" (click)="scrollToSection('top')">
      <div
        class="w-10 h-10 transition-all duration-500 bg-black dark:bg-white group-hover:bg-lime-500"
        style="-webkit-mask-image: url('img/white-lg-33.webp'); mask-image: url('img/white-lg-33.webp'); -webkit-mask-size: contain; mask-size: contain; -webkit-mask-repeat: no-repeat; mask-position: center;"
      ></div>
      <h3 class="text-black dark:text-white text-xl md:text-2xl font-black uppercase tracking-tighter transition-colors duration-500">
        Lift Energy Group
      </h3>
    </div>

    <div class="hidden md:flex items-center gap-8">
      <ul class="flex gap-8 text-[13px] font-bold uppercase tracking-widest text-black dark:text-white transition-colors duration-500">
        <li><button (click)="scrollToSection('top')" class="hover:text-lime-500 transition-colors cursor-pointer">{{ "NAV.WELCOME" | translate }}</button></li>
        <li><button (click)="scrollToSection('services')" class="hover:text-lime-500 transition-colors cursor-pointer">{{ "NAV.SERVICES" | translate }}</button></li>
        <li><button (click)="scrollToSection('projects')" class="hover:text-lime-500 transition-colors cursor-pointer">{{ "NAV.PROJECTS" | translate }}</button></li>
        <li><button (click)="scrollToSection('aboutus')" class="hover:text-lime-500 transition-colors cursor-pointer">{{ "NAV.ABOUT" | translate }}</button></li>
      </ul>

      <button
        (click)="scrollToSection('contact')"
        class="px-6 py-2 rounded-full border border-black dark:border-white text-black dark:text-white font-black text-[12px] uppercase tracking-widest hover:bg-lime-500 hover:border-lime-500 hover:text-black dark:hover:text-black transition-all cursor-pointer"
      >
        {{ "NAV.CONTACT" | translate }}
      </button>

      <div class="flex items-center gap-4 ml-4 pl-4 border-l border-black/10 dark:border-white/10 transition-colors duration-500">
        <button (click)="toggleTheme()" class="text-black dark:text-white hover:text-lime-500 transition-transform active:scale-90 cursor-pointer">
          @if (!isDarkMode) {
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-5 h-5">
              <path stroke-linecap="round" stroke-linejoin="round" d="M12 3v2.25m6.364.386-1.591 1.591M21 12h-2.25m-.386 6.364-1.591-1.591M12 18.75V21m-4.773-4.227-1.591 1.591M5.25 12H3m4.227-4.773L5.636 5.636M15.75 12a3.75 3.75 0 1 1-7.5 0 3.75 3.75 0 0 1 7.5 0Z" />
            </svg>
          } @else {
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-5 h-5">
              <path stroke-linecap="round" stroke-linejoin="round" d="M21.752 15.002A9.72 9.72 0 0 1 18 15.75c-5.385 0-9.75-4.365-9.75-9.75 0-1.33.266-2.597.748-3.752A9.753 9.753 0 0 0 3 11.25C3 16.635 7.365 21 12.75 21a9.753 9.753 0 0 0 9.002-5.998Z" />
            </svg>
          }
        </button>

        <div class="flex gap-2 text-[11px] font-bold">
          <button (click)="switchLanguage('en')" [class.text-lime-500]="currentLang === 'en'" class="text-black/40 dark:text-white/40 hover:text-lime-500 uppercase transition-colors cursor-pointer">EN</button>
          <span class="text-black/20 dark:text-white/20">/</span>
          <button (click)="switchLanguage('es')" [class.text-lime-500]="currentLang === 'es'" class="text-black/40 dark:text-white/40 hover:text-lime-500 uppercase transition-colors cursor-pointer">ES</button>
        </div>
      </div>
    </div>
  </div>
</nav>
