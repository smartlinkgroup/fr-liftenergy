<section class="relative h-[60vh] flex items-center justify-center overflow-hidden bg-black" (mousemove)="onMouseMove($event)">
  
  <div 
    class="absolute inset-0 opacity-60 bg-cover bg-center transition-transform duration-75"
    [style.backgroundImage]="'url(/img/seccion.webp)'"
    [style.transform]="'translate(' + mouseX + 'px, ' + mouseY + 'px) scale(1.1)'">
  </div>

  <div 
    class="absolute inset-0 z-1 transition-transform duration-100 opacity-80 pointer-events-none"
    [style.transform]="'translate(' + (mouseX * -0.5) + 'px, ' + (mouseY * -0.5) + 'px)'">
    <app-energy-grid></app-energy-grid>
  </div>

  <div 
    class="relative z-10 p-10 rounded-3xl border border-white/20 bg-white/10 backdrop-blur-xl shadow-[0_20px_50px_rgba(0,0,0,0.5)] max-w-xl text-center transform-gpu transition-all duration-700"
    [style.transform]="'rotateX(' + rotateX + 'deg) rotateY(' + rotateY + 'deg)'"
    [class.border-lime-400]="isExplored"
    [class.shadow-[0_0_50px_rgba(163,230,53,0.3)]]="isExplored">
    
    <div class="absolute -top-6 left-1/2 -translate-x-1/2 bg-lime-500 text-black text-xs font-bold px-4 py-1 rounded-full uppercase tracking-widest shadow-[0_0_15px_rgba(163,230,53,0.5)]">
      Next Gen
    </div>

    <div *ngIf="!isExplored" class="animate-in fade-in zoom-in duration-300">
      <h2 class="text-5xl font-black text-white mb-6 leading-none tracking-tighter">
        Innovación <br> <span class="text-lime-400">Sin Límites</span>
      </h2>
      
      <p class="text-gray-200 text-lg font-light leading-relaxed mb-8">
        Elevamos la energía a una nueva dimensión digital. Diseño fluido y tecnología de vanguardia para las empresas del mañana.
      </p>
      
      <button 
        (click)="exploreFuture()"
        class="relative z-50 px-10 py-4 border-2 border-lime-400 text-lime-400 rounded-full hover:bg-lime-400 hover:text-black transition-all duration-300 font-black uppercase text-sm tracking-[0.2em] cursor-pointer shadow-[0_0_15px_rgba(163,230,53,0.2)] hover:shadow-[0_0_30px_rgba(163,230,53,0.5)]">
        Explorar el Futuro
      </button>
    </div>

    <div *ngIf="isExplored" class="animate-in slide-in-from-bottom-8 duration-700 text-center">
      <h3 class="text-lime-400 text-sm font-black uppercase tracking-[0.5em] mb-2 animate-pulse">
        Sistemas Activados
      </h3>
      
      <h2 class="text-7xl font-black text-white mb-4 tracking-tighter italic">
        LIFT <span class="text-lime-400">ENERGY</span>
      </h2>
      
      <div class="h-[1px] w-full bg-gradient-to-r from-transparent via-lime-500 to-transparent mb-6"></div>
      
      <p class="text-white text-3xl font-light leading-tight">
        Bienvenido a la <br>
        <span class="font-black italic">REVOLUCIÓN INDUSTRIAL</span>
      </p>
      
    
    </div>

  </div>
</section>
