<div class="group relative w-full max-w-[280px] mx-auto transition-all duration-700 hover:-translate-y-2">
  
  <div class="relative aspect-[3/4] overflow-hidden rounded-2xl mb-6 bg-white shadow-xl border border-gray-200 dark:bg-black/60 dark:border-white/10 dark:shadow-[0_20px_50px_rgba(0,0,0,0.8)] transition-all duration-500">
    <img [src]="imagen" [alt]="nombre" 
         class="w-full h-full object-cover transition-transform duration-1000 group-hover:scale-110">
    <div class="absolute inset-0 bg-gradient-to-t from-black/90 via-black/20 to-transparent opacity-20 dark:opacity-90 transition-opacity duration-500"></div>
  </div>

  <div class="space-y-1 text-center md:text-left px-2">
    <h4 class="text-[#081c15] dark:text-white font-black uppercase tracking-tighter text-xl leading-none transition-colors duration-500">
      {{nombre}}
    </h4>
    
    <p class="text-white dark:text-lime-400 font-bold text-xs uppercase tracking-[0.2em] transition-colors duration-500 mt-2">
      {{cargo}}
    </p>
    
    <div class="h-px w-10 bg-white dark:bg-lime-400 my-3 mx-auto md:mx-0 transition-colors duration-500"></div>
    
    <p class="text-[#081c15] dark:text-gray-300 font-medium dark:font-light text-sm leading-relaxed italic transition-colors duration-500">
      {{profesion}}
    </p>
  </div>
</div>
