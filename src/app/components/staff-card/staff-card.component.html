<div class="group relative w-full max-w-[280px] mx-auto transition-all duration-700 hover:-translate-y-2">
  
  <div class="relative aspect-[3/4] overflow-hidden rounded-2xl mb-6 bg-white/5 border border-white/10 shadow-2xl">
    <img [src]="imagen" [alt]="nombre" 
         class="w-full h-full object-cover transition-transform duration-1000 group-hover:scale-110">
    
    <div class="absolute inset-0 bg-gradient-to-t from-black via-transparent to-transparent opacity-60"></div>
  </div>

  <div class="space-y-1 text-center md:text-left px-2">
    <h4 class="text-white font-black uppercase tracking-tighter text-xl md:text-lg leading-none group-hover:text-lime-400 transition-colors">
      {{nombre}}
    </h4>
    <p class="text-lime-500 font-mono text-[9px] uppercase tracking-[0.3em]">
      {{cargo}}
    </p>
    <div class="h-px w-8 bg-lime-500/30 my-3 mx-auto md:mx-0"></div>
    <p class="text-gray-500 font-light text-[11px] leading-relaxed italic">
      {{profesion}}
    </p>
  </div>
</div>
