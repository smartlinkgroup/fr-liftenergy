<div class="group relative w-full max-w-[280px] mx-auto transition-all duration-700 hover:-translate-y-2">
  
  <!-- CONTENEDOR DE IMAGEN -->
  <div class="relative aspect-[3/4] overflow-hidden rounded-2xl mb-6 bg-white shadow-xl border border-gray-200 dark:bg-black/60 dark:border-white/10 dark:shadow-[0_20px_50px_rgba(0,0,0,0.8)] transition-all duration-500">
    <img [src]="imagen" [alt]="nombre" 
         class="w-full h-full object-cover transition-transform duration-1000 group-hover:scale-110">
    
    <!-- SOMBRA DE PROFUNDIDAD -->
    <div class="absolute inset-0 bg-gradient-to-t from-black/90 via-black/20 to-transparent opacity-60 dark:opacity-90 transition-opacity duration-500"></div>
  </div>

  <div class="space-y-1 text-center md:text-left px-2">
    <!-- NOMBRE: Blanco de día (Sol) / Negro de noche (Luna) -->
    <h4 class="text-white dark:text-black font-black uppercase tracking-tighter text-xl md:text-lg leading-none transition-colors duration-500">
      {{nombre}}
    </h4>
    
    <!-- CARGO: Verde claro de día (Sol) / Verde oscuro de noche (Luna) -->
    <p class="text-lime-400 dark:text-lime-700 font-mono text-[9px] uppercase tracking-[0.3em] transition-colors duration-500">
      {{cargo}}
    </p>
    
    <!-- LÍNEA SEPARADORA -->
    <div class="h-px w-8 bg-lime-400 dark:bg-lime-800 my-3 mx-auto md:mx-0 transition-colors duration-500"></div>
    
    <!-- PROFESIÓN: Blanca de día (Sol) / Negra de noche (Luna) -->
    <p class="text-white dark:text-black font-light text-[11px] leading-relaxed italic transition-colors duration-500">
      {{profesion}}
    </p>
  </div>
</div>
