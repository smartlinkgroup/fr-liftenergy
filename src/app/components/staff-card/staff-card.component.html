<div class="bg-black/40 backdrop-blur-md rounded-xl overflow-hidden shadow-2xl transition-all duration-300 flex flex-col h-full border border-white/10 group hover:border-lime-400/50 hover:shadow-lime-900/50">
  
  <div class="w-full aspect-[4/5] overflow-hidden relative">
    <img [src]="imagen" [alt]="nombre" class="w-full h-full object-cover transition-transform duration-500 group-hover:scale-105">
    
    <div class="absolute inset-0 bg-gradient-to-t from-black/60 to-transparent"></div>
  </div>
  
  <div class="p-5 flex-grow bg-lime-950/80 backdrop-blur-sm border-t border-white/5">
    <h3 class="text-xl font-bold text-lime-300 leading-tight mb-1 group-hover:text-white transition-colors">{{ nombre }}</h3>
    <p class="text-xs font-semibold text-lime-500 uppercase tracking-wider mb-2">{{ cargo }}</p>
    <p class="text-sm text-lime-100 leading-snug">{{ profesion }}</p>
  </div>
</div>
