<div class="min-h-screen bg-[#0a1f11] flex items-center justify-center p-6 relative overflow-hidden">
  
  <div class="absolute top-1/4 left-1/4 w-96 h-96 bg-lime-500/10 rounded-full blur-[120px] pointer-events-none"></div>
  <div class="absolute bottom-1/4 right-1/4 w-96 h-96 bg-green-900/20 rounded-full blur-[100px] pointer-events-none"></div>

  <div class="relative w-full max-w-md bg-white/5 backdrop-blur-xl border border-white/10 rounded-3xl p-10 shadow-2xl z-10 animate-fade-in">
    
    <div class="text-center mb-10">
      <div class="flex justify-center mb-4">
        <div class="w-16 h-16 bg-lime-500/10 rounded-2xl flex items-center justify-center border border-lime-500/20">
          <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" class="text-lime-400">
            <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10"/>
            <path d="m9 12 2 2 4-4"/>
          </svg>
        </div>
      </div>
      <h2 class="text-3xl font-black text-white tracking-widest uppercase">Acceso</h2>
      <p class="text-gray-400 text-sm mt-2 font-light">Portal de Administración</p>
    </div>

    <form [formGroup]="loginForm" (ngSubmit)="onLogin()" class="space-y-6">
      
      <div>
        <label class="block text-xs font-bold text-gray-400 uppercase tracking-widest mb-2 ml-1">Correo Electrónico</label>
        <div class="relative">
          <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-gray-500"><rect width="20" height="16" x="2" y="4" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/></svg>
          </div>
          <input 
            type="email" 
            formControlName="email"
            placeholder="admin@liftenergy.com" 
            class="w-full bg-black/40 border border-white/10 text-white rounded-xl py-3 pl-12 pr-4 focus:outline-none focus:border-lime-500 focus:ring-1 focus:ring-lime-500 transition-colors placeholder-gray-600"
          >
        </div>
        @if (loginForm.get('email')?.touched && loginForm.get('email')?.invalid) {
          <p class="text-red-500 text-[10px] mt-1 ml-1 font-bold uppercase tracking-wider">Ingresa un correo válido</p>
        }
      </div>

      <div>
        <label class="block text-xs font-bold text-gray-400 uppercase tracking-widest mb-2 ml-1">Contraseña</label>
        <div class="relative">
          <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-gray-500"><rect width="18" height="11" x="3" y="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
          </div>
          <input 
            [type]="showPassword ? 'text' : 'password'" 
            formControlName="password"
            placeholder="••••••••" 
            class="w-full bg-black/40 border border-white/10 text-white rounded-xl py-3 pl-12 pr-12 focus:outline-none focus:border-lime-500 focus:ring-1 focus:ring-lime-500 transition-colors placeholder-gray-600"
          >
          <button type="button" (click)="showPassword = !showPassword" class="absolute inset-y-0 right-0 pr-4 flex items-center text-gray-500 hover:text-white transition-colors outline-none">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
            </svg>
          </button>
        </div>
        @if (loginForm.get('password')?.touched && loginForm.get('password')?.invalid) {
          <p class="text-red-500 text-[10px] mt-1 ml-1 font-bold uppercase tracking-wider">La contraseña es obligatoria (mín. 6 caracteres)</p>
        }
      </div>

      <div class="flex items-center justify-between text-sm">
        <label class="flex items-center cursor-pointer group">
          <input type="checkbox" class="w-4 h-4 bg-black/40 border-white/10 rounded text-lime-500 focus:ring-lime-500 focus:ring-offset-gray-900 cursor-pointer">
          <span class="ml-2 text-gray-400 group-hover:text-gray-300 transition-colors">Recordarme</span>
        </label>
        <a href="#" class="text-lime-500 hover:text-lime-400 font-medium transition-colors">¿Olvidaste tu clave?</a>
      </div>

      <button 
        type="submit" 
        [disabled]="loginForm.invalid"
        class="w-full bg-lime-500 hover:bg-lime-400 disabled:bg-white/5 disabled:text-gray-600 disabled:shadow-none disabled:cursor-not-allowed text-black font-black uppercase tracking-widest py-3.5 rounded-xl transition-all duration-300 transform active:scale-95 shadow-[0_0_20px_rgba(132,204,22,0.2)] hover:shadow-[0_0_30px_rgba(132,204,22,0.4)] mt-4 cursor-pointer"
      >
        Ingresar al Sistema
      </button>

    </form>
  </div>
</div>
