<section class="relative min-h-screen bg-transparent flex items-center justify-center py-20 px-6 overflow-hidden">
  <!-- Malla de fondo -->
  <div class="absolute inset-0 z-0 opacity-10 dark:opacity-20 pointer-events-none transition-opacity duration-500">
    <app-energy-grid></app-energy-grid>
  </div>

  <div class="container max-w-5xl mx-auto relative z-10">
    <div class="text-center mb-16">
      <h2 class="text-4xl md:text-5xl font-black text-black dark:text-white uppercase tracking-tighter italic transition-colors duration-300">
        {{ "CONTACT_PAGE.TITLE" | translate }}
        <span class="text-lime-600 dark:text-lime-400 transition-colors duration-300">{{ "CONTACT_PAGE.TITLE_HIGHLIGHT" | translate }}</span>
      </h2>
      <p class="text-black/40 dark:text-white/40 text-sm tracking-[0.3em] uppercase mt-2 transition-colors duration-300">
        Lift Energy Group
      </p>
    </div>

    <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
      <div class="lg:col-span-4 space-y-4">
        
        <!-- TARJETAS LATERALES: Ahora con un tinte verde muy suave -->
        <div class="bg-lime-500/5 dark:bg-black/60 border border-lime-500/10 dark:border-white/5 p-6 rounded-2xl backdrop-blur-md shadow-xl dark:shadow-none transition-all duration-300">
          <h3 class="text-lime-700 dark:text-lime-400 font-black uppercase tracking-widest mb-2 text-xs">
            {{ "CONTACT_PAGE.OFFICE_TITLE" | translate }}
          </h3>
          <p class="text-black dark:text-white text-sm font-medium leading-relaxed">
            {{ "CONTACT_PAGE.ADDRESS" | translate }}
          </p>
        </div>

        <div class="bg-lime-500/5 dark:bg-black/60 border border-lime-500/10 dark:border-white/5 p-6 rounded-2xl backdrop-blur-md shadow-xl dark:shadow-none transition-all duration-300">
          <h3 class="text-lime-700 dark:text-lime-400 font-black uppercase tracking-widest mb-2 text-xs">
            {{ "CONTACT_PAGE.CONTACT_TITLE" | translate }}
          </h3>
          <p class="text-black dark:text-white text-base font-bold italic transition-colors">info@lift.energy</p>
          <p class="text-black dark:text-white text-base font-bold transition-colors">+58 424-606-1052</p>
        </div>
      </div>
      
      <div class="lg:col-span-8">
        <!-- FORMULARIO: Verde difuminado de día / Negro de noche -->
        <div class="bg-lime-500/10 dark:bg-black/60 border border-lime-500/20 dark:border-white/5 p-8 md:p-10 rounded-4xl backdrop-blur-2xl transition-all duration-300 shadow-2xl dark:shadow-none">
          <form class="space-y-6">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
              <div class="space-y-2">
                <label class="text-[10px] text-black/60 dark:text-white/70 font-bold uppercase tracking-widest ml-2">{{ "CONTACT_PAGE.LABEL_NAME" | translate }}</label>
                <input type="text" [placeholder]="'CONTACT_PAGE.PLACEHOLDER_NAME' | translate"
                       class="w-full bg-black/5 dark:bg-white/5 border border-black/10 dark:border-white/10 rounded-xl py-3 px-5 text-black dark:text-white text-sm outline-none focus:border-lime-500 transition-all placeholder:text-black/20 dark:placeholder:text-white/20" />
              </div>
              <div class="space-y-2">
                <label class="text-[10px] text-black/60 dark:text-white/70 font-bold uppercase tracking-widest ml-2">{{ "CONTACT_PAGE.LABEL_EMAIL" | translate }}</label>
                <input type="email" [placeholder]="'CONTACT_PAGE.PLACEHOLDER_EMAIL' | translate"
                       class="w-full bg-black/5 dark:bg-white/5 border border-black/10 dark:border-white/10 rounded-xl py-3 px-5 text-black dark:text-white text-sm outline-none focus:border-lime-500 transition-all placeholder:text-black/20 dark:placeholder:text-white/20" />
              </div>
            </div>

            <div class="space-y-2">
              <label class="text-[10px] text-black/60 dark:text-white/70 font-bold uppercase tracking-widest ml-2">{{ "CONTACT_PAGE.LABEL_MESSAGE" | translate }}</label>
              <textarea rows="4" [placeholder]="'CONTACT_PAGE.PLACEHOLDER_MESSAGE' | translate"
                        class="w-full bg-black/5 dark:bg-white/5 border border-black/10 dark:border-white/10 rounded-xl py-4 px-5 text-black dark:text-white text-sm outline-none focus:border-lime-500 transition-all placeholder:text-black/20 dark:placeholder:text-white/20 resize-none"></textarea>
            </div>

            <button type="button"
                    class="w-full bg-lime-500 hover:bg-lime-400 text-black font-black uppercase text-[11px] tracking-[0.3em] py-5 rounded-xl shadow-lg transition-all duration-500 hover:scale-[1.02] cursor-pointer">
              {{ "CONTACT_PAGE.BTN_SEND" | translate }}
            </button>
          </form>
        </div>
      </div>
    </div>
  </div>
</section>
