<div class="relative bg-transparent pb-32">
  <div class="relative z-10">
    <header class="relative min-h-[90vh] flex flex-col justify-center items-center px-6 text-center scroll-title-dramatic">
      <div class="space-y-6">
        <h2 class="text-[#a3e635] text-[10px] uppercase tracking-[0.8em] font-black opacity-80">{{ "ABOUT_PAGE.SUBTITLE" | translate }}</h2>
        <h1 class="text-6xl md:text-[10rem] font-black tracking-tighter leading-none uppercase text-white">
          <span>{{ "ABOUT_PAGE.TITLE_MAIN" | translate }}</span>
          <span class="text-transparent italic font-light [-webkit-text-stroke:2px_white]">US</span>
        </h1>
      </div>
    </header>

    <section class="max-w-7xl mx-auto px-6 mb-40 space-y-24">
      <div class="grid grid-cols-1 lg:grid-cols-12 gap-12 scroll-card-sync">
        <div class="lg:col-span-4">
          <h3 class="text-4xl md:text-5xl font-black italic text-[#a3e635] uppercase" [innerHTML]="'ABOUT_PAGE.HISTORY_TITLE' | translate"></h3>
          <div class="w-20 h-1 bg-[#a3e635] mt-4 shadow-[0_0_10px_#a3e635]"></div>
        </div>
        <div class="lg:col-span-8 p-8 md:p-12 bg-white/5 border border-white/10 rounded-[2.5rem] backdrop-blur-xl shadow-2xl">
          <p class="text-lg md:text-xl font-medium leading-relaxed text-white">{{ "ABOUT_PAGE.HISTORY_P1" | translate }}</p>
        </div>
      </div>

      <div class="scroll-card-sync relative py-10 px-12 border-l-4 border-[#a3e635] bg-white/5 backdrop-blur-md rounded-r-3xl mx-auto max-w-4xl shadow-lg">
        <p class="text-lg italic font-bold text-white">{{ "ABOUT_PAGE.HISTORY_QUOTE" | translate }}</p>
      </div>

      <div class="grid grid-cols-1 lg:grid-cols-12 gap-12 scroll-card-sync">
        <div class="lg:col-start-5 lg:col-span-8 p-8 md:p-12 bg-white/5 border border-white/10 rounded-[2.5rem] shadow-2xl backdrop-blur-xl">
          <p class="text-lg md:text-xl font-medium leading-relaxed text-white">{{ "ABOUT_PAGE.HISTORY_P2" | translate }}</p>
        </div>
      </div>
    </section>

    <section class="max-w-7xl mx-auto px-6 space-y-32">
      <div class="scroll-card-sync group">
        <div class="flex items-center gap-6 mb-12">
          <span class="text-[#a3e635] uppercase tracking-[0.5em] font-black text-xs">EXECUTIVE BOARD</span>
          <div class="h-px bg-white/10 grow"></div>
        </div>
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-8">
          <app-staff-card nombre="Leonardo Villalobos" [cargo]="'STAFF_ROLES.LEO_CARGO' | translate" [profesion]="'STAFF_ROLES.LEO_PROF' | translate" imagen="img/staff/leonardo.webp"></app-staff-card>
          <app-staff-card nombre="Valentina Mesa" [cargo]="'STAFF_ROLES.VAL_CARGO' | translate" [profesion]="'STAFF_ROLES.VAL_PROF' | translate" imagen="img/staff/valentina.webp"></app-staff-card>
          <app-staff-card nombre="Henry Villalobos" [cargo]="'STAFF_ROLES.HENRY_CARGO' | translate" [profesion]="'STAFF_ROLES.HENRY_PROF' | translate" imagen="img/staff/henry.webp"></app-staff-card>
          <app-staff-card nombre="Exerly Chavez" [cargo]="'STAFF_ROLES.EXE_CARGO' | translate" [profesion]="'STAFF_ROLES.EXE_PROF' | translate" imagen="img/staff/exerly.webp"></app-staff-card>
        </div>
      </div>

      <div class="scroll-card-sync group">
        <div class="flex items-center gap-6 mb-12">
          <span class="text-[#a3e635] uppercase tracking-[0.5em] font-black text-xs">SOFTWARE ENGINEERING</span>
          <div class="h-px bg-white/10 grow"></div>
        </div>
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-8">
          <app-staff-card nombre="Alonso Urdaneta" [cargo]="'STAFF_ROLES.ALON_CARGO' | translate" [profesion]="'STAFF_ROLES.ALON_PROF' | translate" imagen="img/staff/alonso.webp"></app-staff-card>
          <app-staff-card nombre="Diego Malpica" [cargo]="'STAFF_ROLES.DIEGO_CARGO' | translate" [profesion]="'STAFF_ROLES.DIEGO_PROF' | translate" imagen="img/staff/diego.webp"></app-staff-card>
          <app-staff-card nombre="Jose Naranjo" [cargo]="'STAFF_ROLES.JOSE_CARGO' | translate" [profesion]="'STAFF_ROLES.JOSE_PROF' | translate" imagen="img/staff/jnaranjo.webp"></app-staff-card>
          <app-staff-card nombre="Andrea Molina" [cargo]="'STAFF_ROLES.AND_CARGO' | translate" [profesion]="'STAFF_ROLES.AND_PROF' | translate" imagen="img/staff/andrea.webp"></app-staff-card>
        </div>
      </div>

      <div class="scroll-card-sync group">
        <div class="flex items-center gap-6 mb-12">
          <span class="text-[#a3e635] uppercase tracking-[0.5em] font-black text-xs">ELECTRONICS ENGINEERING</span>
          <div class="h-px bg-white/10 grow"></div>
        </div>
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-8">
          <app-staff-card nombre="Valeria Ocando" [cargo]="'STAFF_ROLES.VALERIA_CARGO' | translate" [profesion]="'STAFF_ROLES.VALERIA_PROF' | translate" imagen="img/staff/valeria.webp"></app-staff-card>
          <app-staff-card nombre="Carlos Barrios" [cargo]="'STAFF_ROLES.CARLOS_CARGO' | translate" [profesion]="'STAFF_ROLES.CARLOS_PROF' | translate" imagen="img/staff/carlos.webp"></app-staff-card>
          <app-staff-card nombre="David Ravinovich" [cargo]="'STAFF_ROLES.DAVID_CARGO' | translate" [profesion]="'STAFF_ROLES.DAVID_PROF' | translate" imagen="img/staff/david.webp"></app-staff-card>
        </div>
      </div>
    </section>
  </div>
</div>
