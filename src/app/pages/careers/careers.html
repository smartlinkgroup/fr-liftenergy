<div class="p-10 md:p-16 relative z-10">
  <span class="text-lime-400 text-[10px] font-black uppercase tracking-[0.3em] mb-4 block italic">
    {{ 'CAREERS.MODAL_INFO' | translate }}
  </span>
  
  <h2 class="text-4xl font-black uppercase tracking-tighter mb-10">
    {{ selectedJob?.titulo | translate }}
  </h2>

  <div class="space-y-10">
    <div class="space-y-3">
      <h4 class="text-white text-[10px] font-black uppercase tracking-widest opacity-50">
        {{ 'CAREERS.ROLE_DESC' | translate }}
      </h4>
      <p class="text-gray-400 text-lg leading-relaxed font-light">
        {{ selectedJob?.descripcion | translate }}
      </p>
    </div>

    <div class="space-y-5">
      <h4 class="text-white text-[10px] font-black uppercase tracking-widest opacity-50">
        {{ 'CAREERS.WHAT_LOOKING' | translate }}
      </h4>
      <ul class="grid grid-cols-1 gap-4">
        <li *ngFor="let item of selectedJob?.buscamos" class="flex items-center gap-4 text-gray-400 group">
          <div class="w-1.5 h-1.5 rounded-full bg-lime-400 shadow-[0_0_10px_#a3e635]"></div>
          <span class="text-sm font-light tracking-wide">{{ item | translate }}</span>
        </li>
      </ul>
    </div>

    <div class="pt-10">
      <button class="w-full py-6 bg-lime-400 text-black font-black uppercase text-xs tracking-[0.3em] rounded-2xl hover:bg-white transition-all duration-500">
        {{ 'CAREERS.POSTULAR' | translate }}
      </button>
      <p class="text-[8px] text-gray-600 text-center mt-6 uppercase tracking-widest italic font-light">
        {{ 'CAREERS.REDIRECT_MSG' | translate }}
      </p>
    </div>
  </div>
</div>
