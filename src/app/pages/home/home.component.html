<section class="relative h-screen w-full flex items-center overflow-hidden bg-black py-24 px-6 md:px-16">
  
  <div class="absolute inset-0 z-0">
    <video 
      autoplay 
      muted 
      loop 
      playsinline 
      preload="auto"
      class="w-full h-full object-cover opacity-80">
     <source src="video.MP4" type="video/MP4">
    </video>
    
    <div class="absolute inset-0 bg-gradient-to-b from-black/80 via-transparent to-black/90"></div>
  </div>

  <div class="container mx-auto relative z-10 text-left">
    <div class="max-w-6xl space-y-10">
      
      <h1 class="text-7xl md:text-[10rem] font-black text-white leading-[0.85] tracking-tighter">
        <span class="text-lime-400">Automated</span><br>
        Solutions<br>
        <span class="text-4xl md:text-6xl font-normal opacity-80">for a Better Future</span>
      </h1>
      
      <p class="text-xl md:text-2xl text-gray-200 max-w-2xl font-light leading-relaxed border-l-2 border-lime-500/30 pl-6">
        Commitment to innovation and efficiency for the companies of the future through <span class="text-white font-medium">high-level industrial technology</span>.
      </p>

      <div class="flex flex-wrap gap-6 items-center pt-6">
        <button (click)="navigateTo('/contact')" 
          class="px-10 py-4 bg-lime-500 hover:bg-lime-400 text-black font-bold rounded-full transition-all hover:scale-105 shadow-lg">
          Get started
        </button>
        
        <button (click)="navigateTo('/aboutus')" 
          class="group flex items-center gap-3 px-10 py-4 border border-white/20 hover:bg-white/10 text-white font-medium rounded-full transition-all backdrop-blur-sm">
          <span>Our story</span>
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-4 h-4 group-hover:translate-x-2 transition-transform">
            <path stroke-linecap="round" stroke-linejoin="round" d="M13.5 4.5L21 12m0 0l-7.5 7.5M21 12H3" />
          </svg>
        </button>
      </div>

    </div>
  </div>

  <div class="absolute bottom-10 left-10 z-10 opacity-30 animate-pulse">
    <div class="w-[1px] h-16 bg-gradient-to-b from-white to-transparent"></div>
    <span class="text-[9px] text-white uppercase tracking-widest mt-2 block">Scroll</span>
  </div>

</section>
