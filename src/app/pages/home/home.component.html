<section
  id="top"
  class="relative h-screen w-full flex items-center overflow-hidden bg-transparent m-0 p-0 z-50"
>
  <div class="absolute inset-0 z-0">
    <video
      #bgVideo
      autoplay
      muted
      loop
      playsinline
      preload="auto"
      [muted]="true"
      class="w-full h-full object-cover opacity-90"
    >
      <source src="/video.MP4" type="video/MP4" />
    </video>
    
    <div class="absolute inset-0 bg-black/20 dark:bg-black/50 transition-colors duration-700"></div>
    <div class="absolute bottom-0 w-full h-24 bg-gradient-to-t from-white dark:from-[#010501] to-transparent pointer-events-none transition-colors duration-700"></div>
  </div>

  <div class="container mx-auto relative z-10 px-6 md:px-16 text-left">
    <div class="max-w-6xl space-y-10">
      <h1 class="text-white text-7xl md:text-[9rem] font-black leading-[0.85] tracking-tighter">
        <span class="text-lime-400">{{ "HERO.TITLE_1" | translate }}</span><br />
        {{ "HERO.TITLE_2" | translate }}<br />
        <span class="text-4xl md:text-5xl font-light opacity-70 italic tracking-normal">
          {{ "HERO.TITLE_3" | translate }}
        </span>
      </h1>

      <p class="text-xl md:text-2xl text-white/90 max-w-2xl font-light leading-relaxed border-l-2 border-lime-500/40 pl-6">
        {{ "HERO.DESC_1" | translate }}
        <span class="text-white font-medium italic">{{ "HERO.DESC_2" | translate }}</span>.
      </p>

      <div class="flex flex-wrap gap-6 items-center pt-6">
        <button (click)="navigateTo('/contact')" class="px-10 py-4 bg-lime-500 hover:bg-lime-400 text-black font-bold rounded-full transition-all hover:scale-105 shadow-lg cursor-pointer">
          {{ "HERO.BTN_START" | translate }}
        </button>
        
        <button (click)="navigateTo('/aboutus')" class="group flex items-center gap-3 px-10 py-4 border border-white/20 hover:bg-white/10 text-white font-medium rounded-full transition-all backdrop-blur-sm cursor-pointer">
          <span>{{ "HERO.BTN_STORY" | translate }}</span>
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-4 h-4 group-hover:translate-x-2 transition-transform">
            <path stroke-linecap="round" stroke-linejoin="round" d="M13.5 4.5L21 12m0 0l-7.5 7.5M21 12H3" />
          </svg>
        </button>
      </div>
    </div>
  </div>
</section>

<div class="relative w-full bg-white dark:bg-[#010501] transition-colors duration-700">
  <div class="absolute inset-0 z-0 pointer-events-none opacity-20 dark:opacity-50 transition-opacity duration-700">
    <app-energy-grid></app-energy-grid>
  </div>

  <div class="relative z-10">
    <section id="aboutus" class="relative m-0 p-0 overflow-hidden bg-transparent">
      <app-about-us></app-about-us>
    </section>

    <div class="w-full h-px bg-gradient-to-r from-transparent via-lime-400/30 dark:via-lime-400/20 to-transparent transition-colors duration-700"></div>

    <section id="services" class="relative m-0 p-0 bg-transparent">
      <div class="container mx-auto py-24 px-6">
        <app-services></app-services>
      </div>
    </section>

    <div class="w-full h-px bg-gradient-to-r from-transparent via-lime-400/30 dark:via-lime-400/20 to-transparent transition-colors duration-700"></div>

    <section id="projects" class="relative m-0 p-0 bg-transparent">
      <div class="container mx-auto py-24 px-6">
        <app-projects></app-projects>
      </div>
    </section>
  </div>
</div>

<app-innovation-well></app-innovation-well>

<section id="contact" class="relative bg-white dark:bg-[#010501] transition-colors duration-700">
  <div class="container mx-auto py-24 px-6 border-t border-black/5 dark:border-white/10 transition-colors duration-700">
    <app-contact></app-contact>
  </div>
</section>
