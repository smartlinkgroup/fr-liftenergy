<section id="top" class="relative h-screen w-full flex items-center overflow-hidden bg-transparent m-0 p-0 z-50">
  <div class="absolute inset-0 z-0">
    <video #bgVideo autoplay muted loop playsinline class="w-full h-full object-cover">
      <source src="/video.MP4" type="video/MP4" />
    </video>
    <div
      class="absolute inset-0 bg-linear-to-b from-black/36 via-scroll-track/26 to-[#030504]/78"
    ></div>
    <div
      class="absolute inset-x-0 bottom-0 h-[42%] bg-linear-to-t from-[#010201]/96 via-[#041005]/78 via-55% to-transparent"
    ></div>
    <div
      class="absolute inset-x-0 bottom-0 h-56 bg-linear-to-t from-[#020403] via-[#071408]/68 to-transparent"
    ></div>
  </div>

  <div class="container mx-auto relative z-10 px-6 md:px-16 text-left scroll-title-dramatic">
    <div class="max-w-4xl space-y-6">
      <h1 class="text-white text-7xl md:text-[8rem] font-black leading-[0.85] tracking-tighter">
        <span class="text-[#a3e635]">Automated</span><br />
        Solutions
      </h1>
      <p class="text-white text-4xl md:text-5xl font-light italic opacity-90">for a Better Future</p>
      
      <div class="flex items-start gap-4 max-w-2xl pt-8">
        <div class="w-1 h-20 bg-[#a3e635]"></div>
        <p class="text-white text-lg md:text-xl font-light leading-relaxed">
          Commitment to innovation and efficiency for the companies of the future through <span class="font-bold italic text-[#a3e635]">high-level industrial technology</span>.
        </p>
      </div>

      <p
        class="text-xl md:text-2xl text-gray-300 max-w-2xl font-light leading-relaxed border-l-2 border-lime-500/40 pl-6"
      >
        {{ "HERO.DESC_1" | translate }}
        <span class="text-white font-medium italic">{{
          "HERO.DESC_2" | translate
        }}</span
        >.
      </p>

      <div class="flex flex-wrap gap-6 items-center pt-6">
        <button
          (click)="navigateTo('/contact')"
          class="px-10 py-4 bg-lime-500 hover:bg-lime-400 text-black font-bold rounded-full transition-all hover:scale-105 shadow-[0_0_20px_rgba(154,203,147,0.35)] cursor-pointer"
        >
          {{ "HERO.BTN_START" | translate }}
        </button>
        <button (click)="scrollToSection('aboutus')" class="px-10 py-4 bg-transparent border border-white/40 text-white font-bold rounded-full transition-all hover:bg-white/10 flex items-center gap-3 cursor-pointer">
          Our story <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M13.5 4.5L21 12m0 0l-7.5 7.5M21 12H3"/></svg>
        </button>
      </div>
    </div>
  </div>
</section>

<div
  class="relative w-full bg-linear-to-b from-[#020403] via-[#071408] to-canvas-deep"
>
  <div
    class="absolute inset-x-0 top-0 h-72 bg-linear-to-b from-[#010201] via-[#020403]/96 via-25% via-[#071408]/78 to-transparent z-0 pointer-events-none"
  ></div>
  <div
    class="absolute inset-x-0 top-0 h-[30rem] bg-linear-to-b from-black/48 via-[#041005]/42 to-transparent z-0 pointer-events-none"
  ></div>
  <div class="absolute inset-0 z-0 pointer-events-none opacity-50">
    <app-energy-grid></app-energy-grid>
  </div>

  <div class="relative z-10 space-y-32">
    <section id="aboutus"><app-about-us></app-about-us></section>
    <section id="services" class="container mx-auto px-6"><app-services></app-services></section>
    <section id="projects" class="container mx-auto px-6"><app-projects></app-projects></section>
    <app-innovation-well></app-innovation-well>
  </div>
</div>
